# ATLAS local dev stack.
# Backend talks to existing JIP RDS over VPC; this compose file wires backend+frontend locally.
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: atlas-backend:dev
    container_name: atlas-backend
    env_file:
      - .env
    environment:
      ATLAS_API_HOST: 0.0.0.0
      ATLAS_API_PORT: "8010"
    ports:
      - "8010:8010"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    image: node:20-bookworm-slim
    container_name: atlas-frontend
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8010
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_node_modules:

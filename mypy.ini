[mypy]
# Project-wide mypy settings.
python_version = 3.11
ignore_missing_imports = True
explicit_package_bases = True
exclude = (?x)(^venv/|^build/|^dist/|^node_modules/)

# ---------------------------------------------------------------------------
# scripts/forge_runner: strict mode per research.md §9 and constitution
# ---------------------------------------------------------------------------
[mypy-scripts.forge_runner.*]
strict = True
warn_return_any = True
warn_unused_ignores = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True

# claude_agent_sdk has no published stubs; we provide a skeleton in
# scripts/forge_runner/_sdk_stubs.pyi for the symbols we use.
# ignore_missing_imports is True globally so this resolves without error.
[mypy-claude_agent_sdk.*]
ignore_missing_imports = True

# ---------------------------------------------------------------------------
# Test files: relaxed mode.
# Tests use SimpleNamespace dummies, partial mocks, and factory patterns
# that intentionally bypass strict typing.  Errors here are noise, not signal.
# ---------------------------------------------------------------------------
[mypy-tests.*]
ignore_errors = True

[mypy-alembic.*]
ignore_errors = True

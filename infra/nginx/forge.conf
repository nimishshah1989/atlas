# nginx reverse proxy for ATLAS Forge build dashboard
# Place at /etc/nginx/sites-available/forge.atlas.jsl.internal
# Enable: ln -s /etc/nginx/sites-available/forge.atlas.jsl.internal /etc/nginx/sites-enabled/
# Reload: sudo nginx -t && sudo systemctl reload nginx

# HTTP — ACME challenges + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name forge.atlas.jsl.internal atlas.jslwealth.in;

    # Let's Encrypt http-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Next.js frontend on :3000, /forge route is the dashboard
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name forge.atlas.jsl.internal atlas.jslwealth.in;

    ssl_certificate     /etc/letsencrypt/live/atlas.jslwealth.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atlas.jslwealth.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Read-only — no auth on /forge but block anything that mutates
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # Body size limit (forge dashboard is read-only, small payloads only)
    client_max_body_size 1m;

    # Forge dashboard route → Next.js
    location /forge {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Next.js static assets
    location /_next/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_cache_valid  200 1h;
    }

    # Default — serve full ATLAS app from Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/forge.access.log;
    error_log  /var/log/nginx/forge.error.log warn;
}

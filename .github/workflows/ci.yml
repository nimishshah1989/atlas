name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-quality:
    name: Backend — lint, types, tests, quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio pytest-cov pip-audit

      - name: Ruff lint
        run: ruff check . --select E,F,W

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy backend --ignore-missing-imports

      - name: Pytest
        run: pytest tests/ -v --tb=short --cov=backend --cov-report=json --cov-report=term
        env:
          ATLAS_TEST_MODE: "1"

      - name: Quality gate
        run: python .quality/checks.py --gate --save

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: .quality/report.json

  frontend-build:
    name: Frontend — build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

  docker-build:
    name: Docker — backend image build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: backend-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: atlas-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

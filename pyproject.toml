[tool.ruff]
# Project-wide ruff config.  Rules E, F, W are the project baseline enforced
# via `ruff check . --select E,F,W` per CLAUDE.md §Test commands.
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# Project-wide baseline rules
select = ["E", "F", "W"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: requires real database and services (deselect with -m 'not integration')",
]

*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#080810;--card:#0f0f1e;--card2:#12122a;--border:#1a1a33;
--text:#c8c8e0;--dim:#555577;--accent:#7c7cff;--green:#4ade80;
--red:#f87171;--amber:#fbbf24;--purple:#c084fc;--cyan:#22d3ee;

}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);padding:16px;min-height:100vh}
.wrap{max-width:900px;margin:0 auto}
h1{font-family:var(--font-mono);font-size:18px;color:var(--accent);text-align:center;letter-spacing:2px;margin-bottom:4px}
.sub{text-align:center;color:var(--dim);font-family:var(--font-mono);font-size:11px;margin-bottom:20px}
.grid{display:grid;gap:10px;margin-bottom:16px}
.g4{grid-template-columns:repeat(4,1fr)}
.g5{grid-template-columns:repeat(5,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
label{display:block;color:var(--dim);font-size:10px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
input[type=number]{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:5px;font-family:var(--font-mono);font-size:13px;outline:none}
input[type=number]:focus{border-color:var(--accent)}
.card{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.card .lbl{color:var(--dim);font-size:9px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.5px}
.card .val{font-family:var(--font-mono);font-weight:700;margin-top:3px;font-size:15px}
.big-card{background:linear-gradient(135deg,#1a0a3a,var(--card2));border:1px solid #6c3cf533;border-radius:8px;padding:14px;text-align:center}
.big-card .lbl{color:#8866cc;font-size:10px;font-family:var(--font-mono);text-transform:uppercase}
.big-card .val{color:#b388ff;font-size:26px;font-family:var(--font-mono);font-weight:800;margin-top:2px}
.chart-wrap{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px;overflow:hidden}
.chart-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.chart-hdr span{font-family:var(--font-mono);font-size:10px;color:var(--dim)}
.legend{display:flex;gap:14px;flex-wrap:wrap}
.legend span{font-size:9px;display:flex;align-items:center;gap:4px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
canvas{width:100%;height:280px;display:block;cursor:crosshair}
.btn{background:var(--card);border:1px solid var(--border);color:#aab;padding:7px 18px;border-radius:5px;cursor:pointer;font-family:var(--font-mono);font-size:11px;transition:background .2s}
.btn:hover,.btn.active{background:#2a2a5a}
.btn-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tbl-wrap{background:#080812;border:1px solid var(--border);border-radius:8px;margin-bottom:14px;max-height:380px;overflow:auto}
table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:10px}
th{padding:7px 5px;text-align:left;color:var(--dim);font-size:9px;text-transform:uppercase;border-bottom:1px solid var(--border);position:sticky;top:0;background:#080812}
td{padding:4px 5px;border-bottom:1px solid #111128}
.rules{background:#0a0a18;border:1px solid #141430;border-radius:7px;padding:12px 16px;font-size:10px;color:var(--dim);font-family:var(--font-mono);line-height:1.8}
.tooltip{position:absolute;background:#1a1a3a;border:1px solid var(--accent);border-radius:6px;padding:8px 10px;font-family:var(--font-mono);font-size:10px;pointer-events:none;z-index:10;color:var(--text);white-space:nowrap;display:none}
@media(max-width:700px){.g4,.g5{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr}}
#btnRun:hover{transform:scale(1.02);box-shadow:0 0 20px rgba(124,124,255,0.3)}
.chk-row{display:flex;gap:16px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.chk-row label{display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--text);font-size:11px}
input[type=checkbox]{accent-color:var(--accent)}
</style>

const DATA=RAW.map(r=>({date:r[0],count:r[1],nav:r[2]}));

document.getElementById('dateRange').textContent=DATA[0].date+' → '+DATA[DATA.length-1].date+' · '+DATA.length+' trading days';

function fmt(n){if(n==null||isNaN(n))return"0";let neg=n<0;n=Math.abs(Math.round(n));let s=n.toString();if(s.length<=3)return(neg?"-":"")+s;let r=s.slice(-3),rest=s.slice(0,-3);while(rest.length>2){r=rest.slice(-2)+","+r;rest=rest.slice(0,-2)}if(rest.length)r=rest+","+r;return(neg?"-":"")+r}

function daysBetween(a,b){return(new Date(b)-new Date(a))/864e5}

function calcXIRR(cfs,guess=.1){if(!cfs.length)return 0;const d0=new Date(cfs[0].date);let rate=guess;for(let i=0;i<200;i++){let f=0,df=0;for(const c of cfs){const t=(new Date(c.date)-d0)/315576e5;f+=c.amount/Math.pow(1+rate,t);if(t)df-=t*c.amount/Math.pow(1+rate,t+1)}if(Math.abs(df)<1e-12)break;const nr=rate-f/df;if(Math.abs(nr-rate)<1e-9){rate=nr;break}rate=nr;if(rate<-.99)rate=-.5;if(rate>10)rate=5}return rate}

function simulate(){
const _v=id=>{const v=document.getElementById(id).value;return v===''?null:+v};
const P={
initial:_v('i_initial')??100000,
sip:_v('i_sip')??10000,
lump:_v('i_lumpsum')??50000,
sell400:_v('i_sell400')??30,
fLvl:_v('i_furtherLvl')??250,
fPct:_v('i_furtherPct')??20,
rdLvl:_v('i_redeployLvl')??125,
rdPct:_v('i_redeployPct')??50,
rd2Lvl:_v('i_redeploy2Lvl')??50,
rd2Pct:_v('i_redeploy2Pct')??100
};

// FIFO lot tracker
const lots=[]; // {date, nav, units, remaining}
function addLot(date,nav,amount){
const u=amount/nav;
lots.push({date,nav,units:u,remaining:u});
return u;
}

// FIFO sell: returns {grossProceeds, stcgTax, ltcgTax, totalTax, netProceeds, details[]}
function sellFIFO(sellDate, sellNav, unitsToSell){
const regimeDate='2024-07-23';
const stcgRate=sellDate<regimeDate?0.15:0.20;
const ltcgRate=sellDate<regimeDate?0.10:0.125;
const exemptionLimit=sellDate<regimeDate?100000:125000;
let stcgGain=0, ltcgGain=0, grossProceeds=0, totalCost=0;
const details=[];
for(const lot of lots){
if(lot.remaining<=0||unitsToSell<=0)continue;
const used=Math.min(lot.remaining,unitsToSell);
const holdDays=daysBetween(lot.date,sellDate);
const cost=used*lot.nav;
const proceeds=used*sellNav;
const gain=proceeds-cost;
const isLTCG=holdDays>365;
if(isLTCG)ltcgGain+=gain; else stcgGain+=gain;
grossProceeds+=proceeds; totalCost+=cost;
details.push({buyDate:lot.date,buyNav:lot.nav,units:used,holdDays,cost,proceeds,gain,isLTCG});
lot.remaining-=used;
unitsToSell-=used;
}
// Tax computation (no FY-level exemption tracking for simplicity at sell time;
// we apply a proportional exemption estimate per sell)
const stcgTaxRaw=Math.max(0,stcgGain)*stcgRate;
const ltcgTaxRaw=Math.max(0,ltcgGain)*ltcgRate; // exemption handled at FY level in tax analysis
const cess=(stcgTaxRaw+ltcgTaxRaw)*0.04;
const totalTax=stcgTaxRaw+ltcgTaxRaw+cess;
const netProceeds=grossProceeds-totalTax;
return{grossProceeds,totalCost,stcgGain,ltcgGain,stcgTax:stcgTaxRaw,ltcgTax:ltcgTaxRaw,cess,totalTax,netProceeds,details,stcgRate,ltcgRate};
}

let units=0,liq=0,sipOn=true,exitMode=false,soldAmt=0;
let lastLumpDate=null,sold400=false,soldFurther=false,rd125Done=false,rd50Done=false;
const cfs=[],log=[],daily=[];
let totalTaxPaid=0;

const d1=DATA[0];
units=addLot(d1.date,d1.nav,P.initial);
cfs.push({date:d1.date,amount:-P.initial});
log.push({date:d1.date,action:'Initial Investment',amount:P.initial,nav:d1.nav,count:d1.count,units,liq,fv:units*d1.nav,stcgTax:0,ltcgTax:0,totalTax:0});
let prevCount=d1.count;

for(let i=1;i<DATA.length;i++){
const d=DATA[i],pd=DATA[i-1];
if(liq>0){const days=daysBetween(pd.date,d.date);liq*=Math.pow(1+.06/365,days)}

// SIP
if(sipOn&&!exitMode){
const cm=d.date.slice(0,7),pm=pd.date.slice(0,7);
if(cm!==pm){
const nu=addLot(d.date,d.nav,P.sip);
units+=nu;
cfs.push({date:d.date,amount:-P.sip});
log.push({date:d.date,action:'SIP',amount:P.sip,nav:d.nav,count:d.count,units,liq,fv:units*d.nav,stcgTax:0,ltcgTax:0,totalTax:0});
}
}

// Lumpsum <50
if(d.count<50&&P.lump>0){
const ok=!lastLumpDate||daysBetween(lastLumpDate,d.date)>=30;
if(ok){
const nu=addLot(d.date,d.nav,P.lump);
units+=nu;lastLumpDate=d.date;
cfs.push({date:d.date,amount:-P.lump});
log.push({date:d.date,action:'Lumpsum (Count<50)',amount:P.lump,nav:d.nav,count:d.count,units,liq,fv:units*d.nav,stcgTax:0,ltcgTax:0,totalTax:0});
}
}

// Exit: SIP stops >350
if(d.count>350&&prevCount<=350&&!exitMode){
exitMode=true;sipOn=false;
log.push({date:d.date,action:'SIP Stopped (>350)',amount:0,nav:d.nav,count:d.count,units,liq,fv:units*d.nav,stcgTax:0,ltcgTax:0,totalTax:0})
}

// Sell at 400
if(d.count>=400&&!sold400&&exitMode){
const sellUnits=units*(P.sell400/100);
const tx=sellFIFO(d.date,d.nav,sellUnits);
units-=sellUnits;
liq+=tx.netProceeds; // POST-TAX amount goes to liquid case
soldAmt+=tx.netProceeds;
totalTaxPaid+=tx.totalTax;
sold400=true;
log.push({date:d.date,action:'Sell '+P.sell400+'% @≥400',amount:-tx.grossProceeds,nav:d.nav,count:d.count,units,liq,fv:units*d.nav,
stcgTax:tx.stcgTax,ltcgTax:tx.ltcgTax,totalTax:tx.totalTax,netProceeds:tx.netProceeds,details:tx.details})
}

// Further sell
if(P.fLvl>0&&d.count<P.fLvl&&prevCount>=P.fLvl&&sold400&&!soldFurther&&exitMode){
const sellUnits=units*(P.fPct/100);
const tx=sellFIFO(d.date,d.nav,sellUnits);
units-=sellUnits;
liq+=tx.netProceeds;
soldAmt+=tx.netProceeds;
totalTaxPaid+=tx.totalTax;
soldFurther=true;
log.push({date:d.date,action:'Sell '+P.fPct+'% @<'+P.fLvl,amount:-tx.grossProceeds,nav:d.nav,count:d.count,units,liq,fv:units*d.nav,
stcgTax:tx.stcgTax,ltcgTax:tx.ltcgTax,totalTax:tx.totalTax,netProceeds:tx.netProceeds,details:tx.details})
}

// SIP resumes <200
if(d.count<200&&prevCount>=200&&exitMode){
sipOn=true;exitMode=false;
log.push({date:d.date,action:'SIP Resumed (<200)',amount:0,nav:d.nav,count:d.count,units,liq,fv:units*d.nav,stcgTax:0,ltcgTax:0,totalTax:0})
}

// 1st Redeploy at custom level — uses POST-TAX liquid case
if(P.rdLvl>0&&P.rdPct>0&&d.count<P.rdLvl&&prevCount>=P.rdLvl&&soldAmt>0&&!rd125Done){
const ra=Math.min(liq*(P.rdPct/100), liq);
if(ra>0){
const nu=addLot(d.date,d.nav,ra);
units+=nu;liq-=ra;rd125Done=true;
log.push({date:d.date,action:'Redeploy '+P.rdPct+'% @<'+P.rdLvl,amount:ra,nav:d.nav,count:d.count,units,liq,fv:units*d.nav,stcgTax:0,ltcgTax:0,totalTax:0})
}
}

// 2nd Redeploy at custom level — deploys % of remaining liquid case
if(P.rd2Lvl>0&&P.rd2Pct>0&&d.count<P.rd2Lvl&&!rd50Done&&liq>0){
const ra=liq*(P.rd2Pct/100);
if(ra>0){
const nu=addLot(d.date,d.nav,ra);
units+=nu;liq-=ra;
if(P.rd2Pct>=100)soldAmt=0;
rd50Done=true;
log.push({date:d.date,action:'Redeploy '+P.rd2Pct+'% @<'+P.rd2Lvl,amount:ra,nav:d.nav,count:d.count,units,liq,fv:units*d.nav,stcgTax:0,ltcgTax:0,totalTax:0})
}
}

// Reset cycle
if(d.count>=400&&rd50Done){sold400=false;soldFurther=false;rd125Done=false;rd50Done=false;soldAmt=0}

daily.push({date:d.date,count:d.count,nav:d.nav,fv:units*d.nav,liq,total:units*d.nav+liq,units});
prevCount=d.count;
}

const last=DATA[DATA.length-1];
const finalFV=units*last.nav,finalTotal=finalFV+liq;
const netCfs=[cfs[0]];
for(let i=1;i<cfs.length;i++)if(cfs[i].amount<0)netCfs.push(cfs[i]);
netCfs.push({date:last.date,amount:finalTotal});

const totalInv=cfs.filter(c=>c.amount<0).reduce((s,c)=>s+Math.abs(c.amount),0);
let xirr=0;try{xirr=calcXIRR(netCfs)}catch(e){}
const years=daysBetween(DATA[0].date,last.date)/365.25;
const cagr=Math.pow(finalTotal/totalInv,1/years)-1;
const absGain=((finalTotal-totalInv)/totalInv)*100;

// Unrealised tax if sold today
let unrealisedSTCG=0,unrealisedLTCG=0;
for(const lot of lots){
if(lot.remaining<=0)continue;
const holdDays=daysBetween(lot.date,last.date);
const gain=lot.remaining*(last.nav-lot.nav);
if(holdDays>365)unrealisedLTCG+=gain; else unrealisedSTCG+=gain;
}
const unSTCGtax=Math.max(0,unrealisedSTCG)*0.20;
const unLTCGtax=Math.max(0,unrealisedLTCG-125000)*0.125;
const unCess=(unSTCGtax+unLTCGtax)*0.04;
const unrealisedTotalTax=unSTCGtax+unLTCGtax+unCess;

// Post-all-tax value (realised tax already deducted; subtract unrealised if sold today)
const postAllTaxTotal=finalTotal-unrealisedTotalTax;
const postAllTaxAbsGain=((postAllTaxTotal-totalInv)/totalInv)*100;
const postAllTaxCAGR=Math.pow(postAllTaxTotal/totalInv,1/years)-1;
const postAllTaxCfs=[...netCfs];
postAllTaxCfs[postAllTaxCfs.length-1]={date:last.date,amount:postAllTaxTotal};
let postAllTaxXIRR=0;try{postAllTaxXIRR=calcXIRR(postAllTaxCfs)}catch(e){}

// Invested line
const investedLine=[];
let cumInv=P.initial;
investedLine.push({date:DATA[0].date,value:cumInv});
for(let i=1;i<DATA.length;i++){
const dayCfs=cfs.filter(c=>c.date===DATA[i].date&&c.amount<0);
for(const c of dayCfs)cumInv+=Math.abs(c.amount);
investedLine.push({date:DATA[i].date,value:cumInv});
}

// ===== NIFTY REFERENCE PORTFOLIOS =====
// Same cash deployments (initial + all SIPs + all lumpsums) but pure buy-and-hold, no selling, no SIP stops
// Re-simulate from scratch: SIP every month, lumpsum at count<50 with 30d cooldown — ignoring exit/sell/redeploy rules
let n50Units=0, n500Units=0;
const n50Daily=[], n500Daily=[];
let refLastLumpDate=null;

// Day 1: initial
const n50Price0=N50[DATA[0].date]||10769;
const n500Price0=N500[DATA[0].date]||9345;
n50Units=P.initial/n50Price0;
n500Units=P.initial/n500Price0;

for(let i=0;i<DATA.length;i++){
const d=DATA[i];
const n50P=N50[d.date]||n50Price0;
const n500P=N500[d.date]||n500Price0;

if(i>0){
const pd=DATA[i-1];
const cm=d.date.slice(0,7),pm=pd.date.slice(0,7);
// SIP every month (no stops)
if(cm!==pm && P.sip>0){
n50Units+=P.sip/n50P;
n500Units+=P.sip/n500P;
}
// Lumpsum at count<50 with 30d cooldown (same signal, no stops)
if(d.count<50 && P.lump>0){
const ok=!refLastLumpDate||daysBetween(refLastLumpDate,d.date)>=30;
if(ok){
n50Units+=P.lump/n50P;
n500Units+=P.lump/n500P;
refLastLumpDate=d.date;
}
}
}

n50Daily.push(n50Units*n50P);
n500Daily.push(n500Units*n500P);
}

return{daily,log,totalInv,finalFV,liq,finalTotal,xirr,cagr,absGain,years,netCfs,investedLine,
totalTaxPaid,unrealisedSTCG,unrealisedLTCG,unrealisedTotalTax,
postAllTaxTotal,postAllTaxAbsGain,postAllTaxCAGR,postAllTaxXIRR,lots,
n50Daily,n500Daily};
}

if(m>=3)return 'FY'+y+'-'+(y+1-2000);
return 'FY'+(y-1)+'-'+(y-2000);
}

function drawChart(R){
const canvas=document.getElementById('chart');
const ctx=canvas.getContext('2d');
const dpr=window.devicePixelRatio||1;
const rect=canvas.getBoundingClientRect();
canvas.width=rect.width*dpr;
canvas.height=280*dpr;
ctx.scale(dpr,dpr);
const W=rect.width,H=280;
const m={t:24,r:50,b:28,l:58};
const w=W-m.l-m.r,h=H-m.t-m.b;
ctx.clearRect(0,0,W,H);

const dd=R.daily;
const showN50=document.getElementById('chk_n50').checked;
const showN500=document.getElementById('chk_n500').checked;
const showBreadth=document.getElementById('chk_breadth').checked;
const showInvested=document.getElementById('chk_invested').checked;

// All lines are actual ₹ portfolio values — normalize to base 100 from day 1
const base={
total:dd[0]?dd[0].total||1:1,
n50:R.n50Daily[0]||1,
n500:R.n500Daily[0]||1,
inv:R.investedLine[0].value||1
};

let maxNorm=0,minNorm=Infinity;
const norms=dd.map((d,i)=>{
const t=(d.total/base.total)*100;
const n5=(R.n50Daily[i]/base.n50)*100;
const n5h=(R.n500Daily[i]/base.n500)*100;
const inv=((R.investedLine[i+1]?.value||R.investedLine[i]?.value||base.inv)/base.inv)*100;
const vals=[t];
if(showN50)vals.push(n5);
if(showN500)vals.push(n5h);
if(showInvested)vals.push(inv);
maxNorm=Math.max(maxNorm,...vals);
minNorm=Math.min(minNorm,...vals);
return{t,n50:n5,n500:n5h,inv};
});

const maxCount=Math.max(...dd.map(d=>d.count));
const pad=(maxNorm-minNorm)*0.05;
minNorm-=pad;maxNorm+=pad;

const xS=i=>m.l+(i/(dd.length-1))*w;
const yS=v=>m.t+h-((v-minNorm)/(maxNorm-minNorm))*h;
const yC=v=>m.t+h-(v/maxCount)*h;

// Grid
ctx.strokeStyle='#1a1a3a';ctx.lineWidth=.5;
for(let f=0;f<=1;f+=.25){const y=m.t+h*(1-f);ctx.beginPath();ctx.moveTo(m.l,y);ctx.lineTo(W-m.r,y);ctx.stroke()}

// Breadth area
if(showBreadth){
ctx.fillStyle='rgba(255,107,107,0.04)';
ctx.beginPath();ctx.moveTo(xS(0),yC(dd[0].count));
for(let i=1;i<dd.length;i++)ctx.lineTo(xS(i),yC(dd[i].count));
ctx.lineTo(xS(dd.length-1),m.t+h);ctx.lineTo(xS(0),m.t+h);ctx.fill();
ctx.strokeStyle='rgba(255,107,107,0.2)';ctx.lineWidth=.8;
ctx.beginPath();ctx.moveTo(xS(0),yC(dd[0].count));
for(let i=1;i<dd.length;i++)ctx.lineTo(xS(i),yC(dd[i].count));
ctx.stroke();
// Threshold lines
ctx.setLineDash([4,4]);
ctx.strokeStyle='rgba(251,191,36,0.2)';ctx.beginPath();ctx.moveTo(m.l,yC(50));ctx.lineTo(W-m.r,yC(50));ctx.stroke();
ctx.strokeStyle='rgba(248,113,113,0.2)';ctx.beginPath();ctx.moveTo(m.l,yC(400));ctx.lineTo(W-m.r,yC(400));ctx.stroke();
ctx.setLineDash([]);
ctx.fillStyle='rgba(251,191,36,0.3)';ctx.font='7px var(--font-mono)';ctx.fillText('50',W-m.r+4,yC(50)+3);
ctx.fillStyle='rgba(248,113,113,0.3)';ctx.fillText('400',W-m.r+4,yC(400)+3);
}

// Invested line
if(showInvested){
ctx.strokeStyle='rgba(100,100,160,0.4)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
ctx.beginPath();
for(let i=0;i<norms.length;i++){const y=yS(norms[i].inv||100);i===0?ctx.moveTo(xS(i),y):ctx.lineTo(xS(i),y)}
ctx.stroke();ctx.setLineDash([]);
}

// Nifty 500
if(showN500){
ctx.strokeStyle='rgba(251,191,36,0.5)';ctx.lineWidth=1;
ctx.beginPath();
for(let i=0;i<norms.length;i++){const y=yS(norms[i].n500);i===0?ctx.moveTo(xS(i),y):ctx.lineTo(xS(i),y)}
ctx.stroke();
}

// Nifty 50
if(showN50){
ctx.strokeStyle='rgba(34,211,238,0.5)';ctx.lineWidth=1;
ctx.beginPath();
for(let i=0;i<norms.length;i++){const y=yS(norms[i].n50);i===0?ctx.moveTo(xS(i),y):ctx.lineTo(xS(i),y)}
ctx.stroke();
}

// Strategy line
ctx.strokeStyle='var(--accent)';ctx.lineWidth=1.8;
ctx.beginPath();ctx.moveTo(xS(0),yS(norms[0].t));
for(let i=1;i<norms.length;i++)ctx.lineTo(xS(i),yS(norms[i].t));
ctx.stroke();

// Event markers
const actionColors={'SIP Stopped':'#f87171','Sell':'#f87171','Redeploy':'#c084fc','SIP Resumed':'#4ade80'};
R.log.forEach(l=>{
let color=null;
for(const[k,c]of Object.entries(actionColors))if(l.action.includes(k)){color=c;break}
if(!color)return;
const di=dd.findIndex(d=>d.date===l.date);
if(di<0)return;
ctx.fillStyle=color;ctx.beginPath();
ctx.arc(xS(di),yS(norms[di].t),3,0,Math.PI*2);ctx.fill();
});

// Axis labels
ctx.fillStyle='var(--dim)';ctx.font='8px var(--font-mono)';ctx.textAlign='end';
ctx.fillText(maxNorm.toFixed(0),m.l-4,m.t+8);
ctx.fillText(minNorm.toFixed(0),m.l-4,m.t+h);
ctx.fillText('Normalized to 100',m.l-4,m.t+h/2+3);
ctx.textAlign='center';
[0,.25,.5,.75,1].forEach(f=>{
const i=Math.floor(f*(dd.length-1));
ctx.fillText(dd[i]?.date?.slice(0,7)||'',xS(i),H-4);
});

// Final values as text
ctx.textAlign='left';ctx.font='bold 9px var(--font-mono)';
const lastI=norms.length-1;
const lastX=W-m.r+4;
ctx.fillStyle='var(--accent)';ctx.fillText(norms[lastI].t.toFixed(0),lastX,yS(norms[lastI].t)+3);
if(showN50&&norms[lastI].n50){ctx.fillStyle='var(--cyan)';ctx.fillText(norms[lastI].n50.toFixed(0),lastX,yS(norms[lastI].n50)+3)}
if(showN500&&norms[lastI].n500){ctx.fillStyle='var(--amber)';ctx.fillText(norms[lastI].n500.toFixed(0),lastX,yS(norms[lastI].n500)+3)}

// Tooltip on hover
canvas.onmousemove=function(e){
const brect=canvas.getBoundingClientRect();
const mx=e.clientX-brect.left;
const idx=Math.round((mx-m.l)/w*(dd.length-1));
if(idx<0||idx>=dd.length){document.getElementById('tooltip').style.display='none';return}
const d=dd[idx];
const tt=document.getElementById('tooltip');
let html=d.date+'<br>Count: '+d.count+'<br>Strategy: ₹'+fmt(d.total);
if(showN50)html+='<br>Nifty50 B&H: ₹'+fmt(R.n50Daily[idx]);
if(showN500)html+='<br>Nifty500 B&H: ₹'+fmt(R.n500Daily[idx]);
if(showInvested)html+='<br>Invested: ₹'+fmt(R.investedLine[idx+1]?.value||R.investedLine[idx]?.value);
tt.innerHTML=html;
tt.style.display='block';
tt.style.left=(mx+16)+'px';
tt.style.top=(yS(norms[idx].t)-20)+'px';
if(mx>W*0.7)tt.style.left=(mx-140)+'px';
};
canvas.onmouseleave=()=>{document.getElementById('tooltip').style.display='none'};
}

}

// Unrealised holdings
html+='<div style="margin:10px 0 6px;color:var(--dim);font-family:var(--font-mono);font-size:11px;font-weight:600">UNREALISED TAX (if sold on '+DATA[DATA.length-1].date+')</div>';
html+='<div class="tbl-wrap"><table><thead><tr>';
['Type','Gain','Exemption','Taxable','Rate','Tax','+ Cess'].forEach(c=>html+='<th>'+c+'</th>');
html+='</tr></thead><tbody>';
const unSTCGtax=Math.max(0,R.unrealisedSTCG)*0.20;
const unLTCGtaxable=Math.max(0,R.unrealisedLTCG-125000);
const unLTCGtax=unLTCGtaxable*0.125;
html+='<tr><td style="color:var(--amber)">STCG</td><td style="color:var(--green)">₹'+fmt(R.unrealisedSTCG)+'</td><td>-</td><td>₹'+fmt(Math.max(0,R.unrealisedSTCG))+'</td><td>20%</td><td style="color:var(--red)">₹'+fmt(unSTCGtax)+'</td><td style="color:var(--red)">₹'+fmt(unSTCGtax*0.04)+'</td></tr>';
html+='<tr><td style="color:var(--purple)">LTCG</td><td style="color:var(--green)">₹'+fmt(R.unrealisedLTCG)+'</td><td>₹1,25,000</td><td>₹'+fmt(unLTCGtaxable)+'</td><td>12.5%</td><td style="color:var(--red)">₹'+fmt(unLTCGtax)+'</td><td style="color:var(--red)">₹'+fmt(unLTCGtax*0.04)+'</td></tr>';
html+='</tbody></table></div>';

document.getElementById('taxWrap').innerHTML=html;
document.getElementById('taxRulesText').style.display='block';
document.getElementById('taxRulesText').innerHTML='<span style="color:#666688">TAX RULES:</span> Equity MF (>65% equity) · Pre 23-Jul-2024: STCG 15%, LTCG 10%, ₹1L exemption · Post 23-Jul-2024: STCG 20%, LTCG 12.5%, ₹1.25L exemption · >12 months = LTCG · 4% H&E Cess · <b style="color:var(--amber)">Tax is deducted from corpus at point of every sell</b> — redeployments use post-tax money only · FIFO lot matching';
}

// Run button - the only way to trigger simulation
document.getElementById('btnRun').addEventListener('click',function(){
this.textContent='⏳ Running...';
this.style.background='linear-gradient(135deg,#3a2a7a,#2a4a8a)';
setTimeout(()=>{
render();
this.textContent='✓ Done!';
this.style.background='linear-gradient(135deg,#1a3a2a,#1a5a3a)';
this.style.borderColor='var(--green)';
setTimeout(()=>{
this.textContent='▶ Run Simulation';
this.style.background='linear-gradient(135deg,#2a1a5a,#1a3a6a)';
this.style.borderColor='var(--accent)';
},1200);
},50);
});

// Checkbox toggles only redraw chart (no re-simulation needed, just visual)
document.querySelectorAll('input[type=checkbox]').forEach(el=>el.addEventListener('change',()=>{const R=simulate();drawChart(R)}));

document.getElementById('btnLog').addEventListener('click',function(){
const w=document.getElementById('logWrap');
const show=w.style.display==='none';
w.style.display=show?'block':'none';
this.classList.toggle('active',show);
// Update arrow only, keep count from last render
this.textContent=this.textContent.replace(/^[▸▾]/,show?'▾':'▸');
});

document.getElementById('btnCf').addEventListener('click',function(){
const w=document.getElementById('cfWrap');
const show=w.style.display==='none';
w.style.display=show?'block':'none';
this.classList.toggle('active',show);
this.textContent=this.textContent.replace(/^[▸▾]/,show?'▾':'▸');
});

document.getElementById('btnTax').addEventListener('click',function(){
const w=document.getElementById('taxWrap');
const show=w.style.display==='none';
w.style.display=show?'block':'none';
document.getElementById('taxCards').style.display=show?'grid':'none';
document.getElementById('taxRulesText').style.display=show?'block':'none';
this.classList.toggle('active',show);
this.textContent=this.textContent.replace(/^[▸▾]/,show?'▾':'▸');
});

// Initial render
render();
window.addEventListener('resize',()=>{const R=simulate();drawChart(R)});
</script>
</body>
</html>

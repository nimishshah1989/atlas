# ============================================================================
# §8.3 States contract checks (8 checks)
# ============================================================================

  - id: v2fe-sc-01
    title: "atlas-data.js: data-state attribute transitions are present (loading/ready/stale/empty/error)"
    check_type: file_contains
    severity: critical
    page: global
    file: "frontend/mockups/assets/atlas-data.js"
    pattern: "data-state"

  - id: v2fe-sc-02
    title: "atlas-states.js: STALENESS_THRESHOLDS constant is present"
    check_type: file_contains
    severity: critical
    page: global
    file: "frontend/mockups/assets/atlas-states.js"
    pattern: "STALENESS_THRESHOLDS"

  - id: v2fe-sc-03
    title: "atlas-states.js: STALENESS_THRESHOLDS has intraday key (3600)"
    check_type: file_contains
    severity: critical
    page: global
    file: "frontend/mockups/assets/atlas-states.js"
    pattern: "intraday"

  - id: v2fe-sc-04
    title: "atlas-states.js: renderSkeleton function is exported"
    check_type: file_contains
    severity: critical
    page: global
    file: "frontend/mockups/assets/atlas-states.js"
    pattern: "function renderSkeleton"

  - id: v2fe-sc-05
    title: "atlas-states.js: renderEmpty function is exported"
    check_type: file_contains
    severity: critical
    page: global
    file: "frontend/mockups/assets/atlas-states.js"
    pattern: "function renderEmpty"

  - id: v2fe-sc-06
    title: "atlas-states.js: renderStaleBanner function is exported"
    check_type: file_contains
    severity: critical
    page: global
    file: "frontend/mockups/assets/atlas-states.js"
    pattern: "function renderStaleBanner"

  - id: v2fe-sc-07
    title: "atlas-states.js: renderError function is exported"
    check_type: file_contains
    severity: critical
    page: global
    file: "frontend/mockups/assets/atlas-states.js"
    pattern: "function renderError"

  - id: v2fe-sc-08
    title: "atlas-data.js: insufficient_data guard is present"
    check_type: file_contains
    severity: high
    page: global
    file: "frontend/mockups/assets/atlas-data.js"
    pattern: "insufficient_data"

  - id: v2fe-sc-09
    title: "atlas-data.js: 10-second hard cut-off setTimeout guard is present"
    check_type: file_contains
    severity: critical
    page: global
    file: "frontend/mockups/assets/atlas-data.js"
    pattern: "10000"

  - id: v2fe-sc-10
    title: "atlas-data.js: data-as-of attribute is synced from _meta.data_as_of"
    check_type: file_contains
    severity: high
    page: global
    file: "frontend/mockups/assets/atlas-data.js"
    pattern: "data-as-of"

  - id: v2fe-sc-11
    title: "atlas-data.js: dev-mode ?sim_state= URL param support is present (localhost-gated)"
    check_type: file_contains
    severity: high
    page: global
    file: "frontend/mockups/assets/atlas-data.js"
    pattern: "sim_state"

  - id: v2fe-sc-12
    title: "atlas-states.js: renderError includes a retry affordance (data-retry button)"
    check_type: file_contains
    severity: high
    page: global
    file: "frontend/mockups/assets/atlas-states.js"
    pattern: "data-retry"

# ============================================================================
# §8.4 Integration / smoke checks (4 checks)
# ============================================================================

  - id: v2fe-sm-01
    title: "assets/atlas-data.js file exists and is non-empty"
    check_type: file_exists
    severity: critical
    page: global
    file: "frontend/mockups/assets/atlas-data.js"

  - id: v2fe-sm-02
    title: "assets/atlas-states.js file exists and is non-empty"
    check_type: file_exists
    severity: critical
    page: global
    file: "frontend/mockups/assets/atlas-states.js"

  - id: v2fe-sm-03
    title: "atlas-data.js: loadBlock function is defined"
    check_type: file_contains
    severity: critical
    page: global
    file: "frontend/mockups/assets/atlas-data.js"
    pattern: "function loadBlock"

  - id: v2fe-sm-04
    title: "atlas-data.js: fetchWithTimeout function is defined"
    check_type: file_contains
    severity: critical
    page: global
    file: "frontend/mockups/assets/atlas-data.js"
    pattern: "function fetchWithTimeout"

# ============================================================================
# §8.5 Regression checks (3 checks)
# ============================================================================

  - id: v2fe-rg-01
    title: "V1FE gate: scripts/check-frontend-criteria.py exits 0 (no regressions)"
    check_type: runner_exits_zero
    severity: critical
    page: global
    command: "python3 scripts/check-frontend-criteria.py --report-only"

  - id: v2fe-rg-02
    title: "atlas-data.js: no TypeScript syntax (must be plain ES2020)"
    check_type: file_not_contains
    severity: high
    page: global
    file: "frontend/mockups/assets/atlas-data.js"
    pattern: ": string|: number|: boolean|interface |<T>"

  - id: v2fe-rg-03
    title: "atlas-states.js: no TypeScript syntax (must be plain ES2020)"
    check_type: file_not_contains
    severity: high
    page: global
    file: "frontend/mockups/assets/atlas-states.js"
    pattern: ": string|: number|: boolean|interface |<T>"

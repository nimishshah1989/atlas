version: "1"
slice: "V2-Frontend-Stage0"
source: "docs/specs/chunks/V2FE-0.md"
locked_at: "2026-04-19"

# ============================================================================
# ATLAS Frontend V2 — Stage 0 machine-readable criteria
# ============================================================================
#
# This YAML gates the entire V2FE slice. It is checked by:
#   scripts/check-frontend-v2.py
#
# §8.1  Backend connectivity checks (v2fe-be-*)
#   check_type: backend_probe
#   Tries a live HTTP GET; gracefully SKIPs if backend is unreachable.
#
# §8.2  Per-page binding checks (v2fe-pg-*)
#   check_type: file_contains (regex pattern present in HTML file)
#
# §8.3  States contract checks (v2fe-sc-*)
#   check_type: file_contains or file_exists
#
# §8.4  Integration / smoke checks (v2fe-sm-*)
#   check_type: file_exists
#
# §8.5  Regression checks (v2fe-rg-*)
#   check_type: runner_exits_zero
#
# severity: critical | high | medium
#   critical — blocks ship
#   high     — blocks ship unless exception approved
#   medium   — recorded in quality score, does not block
# ============================================================================

settings:
  backend_base: "http://localhost:8000"
  mockups_root: "frontend/mockups"
  assets_root: "frontend/mockups/assets"

# ============================================================================
# §8.1 Backend connectivity checks (9 checks — one per key V2FE endpoint)
# ============================================================================

criteria:

  - id: v2fe-be-01
    title: "Backend: /api/v1/breadth/global returns 200 or is unreachable"
    check_type: backend_probe
    severity: high
    page: global
    endpoint: "/api/v1/breadth/global"
    timeout_seconds: 3

  - id: v2fe-be-02
    title: "Backend: /api/v1/sectors returns 200 or is unreachable"
    check_type: backend_probe
    severity: high
    page: global
    endpoint: "/api/v1/sectors"
    timeout_seconds: 3

  - id: v2fe-be-03
    title: "Backend: /api/v1/stocks/{symbol} returns 200 or is unreachable"
    check_type: backend_probe
    severity: high
    page: stock-detail
    endpoint: "/api/v1/stocks/RELIANCE.NS"
    timeout_seconds: 3

  - id: v2fe-be-04
    title: "Backend: /api/v1/funds/{isin} returns 200 or is unreachable"
    check_type: backend_probe
    severity: high
    page: mf-detail
    endpoint: "/api/v1/funds/INF846K01EW2"
    timeout_seconds: 3

  - id: v2fe-be-05
    title: "Backend: /api/v1/breadth/country returns 200 or is unreachable"
    check_type: backend_probe
    severity: high
    page: explore-country
    endpoint: "/api/v1/breadth/country"
    timeout_seconds: 3

  - id: v2fe-be-06
    title: "Backend: /api/v1/breadth/sector returns 200 or is unreachable"
    check_type: backend_probe
    severity: high
    page: explore-sector
    endpoint: "/api/v1/breadth/sector"
    timeout_seconds: 3

  - id: v2fe-be-07
    title: "Backend: /api/v1/today/pulse returns 200 or is unreachable"
    check_type: backend_probe
    severity: high
    page: today
    endpoint: "/api/v1/today/pulse"
    timeout_seconds: 3

  - id: v2fe-be-08
    title: "Backend: /api/v1/global/indices returns 200 or is unreachable"
    check_type: backend_probe
    severity: high
    page: explore-global
    endpoint: "/api/v1/global/indices"
    timeout_seconds: 3

  - id: v2fe-be-09
    title: "Backend: /health returns 200 or is unreachable"
    check_type: backend_probe
    severity: medium
    page: global
    endpoint: "/health"
    timeout_seconds: 3


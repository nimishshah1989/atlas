    description: >
      DP §18 requires every analytical surface to expose a 'Simulate this'
      entry point that deep-links to the Lab with prefilled params.
      Selector variants allowed: button, anchor, or component shell.
    severity: critical
    source_spec_section: "DP §18; spec §1.10 row 7"
    check:
      type: dom_required
      files:
        - stock-detail.html
        - mf-detail.html
        - breadth.html
        - explore-country.html
        - explore-sector.html
      selector: "[data-action='simulate-this'], .simulate-this, a[href*='lab.html']"
      min_count: 1

  # ---------- DP §3 Four universal benchmarks ----------
  - id: fe-dp-15
    title: "four-universal-benchmarks row on Global + Country + Stock + MF"
    description: >
      DP §3 mandates MSCI World · S&P 500 · Nifty 50 TRI · Gold as the four
      universal benchmarks rendered on every performance-context page.
      Label text variants permitted via data-benchmark attr.
    severity: critical
    source_spec_section: "DP §3; spec §4, §5, §7, §8, §1.10 row 8"
    check:
      type: dom_required
      files:
        - explore-global.html
        - explore-country.html
        - stock-detail.html
        - mf-detail.html
      selector: "[data-component='four-universal-benchmarks'] [data-benchmark]"
      min_count: 4
      must_include_data_benchmark:
        - msci-world
        - sp500
        - nifty50tri
        - gold

  # ---------- DP §10 Conviction score range ----------
  - id: fe-dp-16
    title: "conviction-chip: data-score is an integer 0..100"
    severity: high
    source_spec_section: "DP §10"
    check:
      type: attr_numeric_range
      files:
        - stock-detail.html
        - mf-detail.html
      selector: "[data-chip='conviction']"
      attr: "data-score"
      min: 0
      max: 100
      integer_only: true

  # ---------- DP cross-reference matrix coverage ----------
  - id: fe-dp-17
    title: "spec §1.10 cross-reference matrix lists every DP-mandated component"
    description: >
      Meta-check: the cross-reference table in spec §1.10 must enumerate
      every component referenced by GROUP 9. Prevents silent drift where
      a DP component is added without a binding in the page x component
      matrix.
    severity: high
    source_spec_section: "spec §1.10"
    check:
      type: grep_require
      file: docs/design/frontend-v1-spec.md
      patterns:
        - "regime-banner"
        - "signal-strip"
        - "gold-rs-chip"
        - "conviction-chip"
        - "divergences-block"
        - "dual-axis-overlay"
        - "interpretation-sidecar"
        - "signal-history-table"
        - "four-decision-card"
        - "simulate-this"
        - "four-universal-benchmarks"
      min_matches_each: 1


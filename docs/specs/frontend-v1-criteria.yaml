version: "1"
slice: "V1-Frontend-Stage1"
source: "docs/design/frontend-v1-spec.md"
locked_at: "2026-04-18"

# ============================================================================
# ATLAS Frontend V1 — Stage 1 machine-readable criteria
# ============================================================================
#
# Every criterion here is one executable check the quality harness runs
# before a frontend chunk can reach DONE. Criteria map 1:1 to sections in
# frontend-v1-spec.md — that spec is the source of truth; this YAML is how
# we enforce it.
#
# Check types understood by scripts/check-frontend-criteria.py (authored in
# chunk S1-PRE-0). v1.1 vocabulary — complete inventory:
#
#   ---- static / grep ----
#   grep_forbid         pattern P across files F must return 0 matches
#   grep_require        pattern P across files F must return >=N matches
#   kill_list           no BUY/HOLD/SELL/verdict language in file F
#   i18n_indian         file F has no $, million, billion, MM-DD date patterns
#
#   ---- file system ----
#   file_exists         every path in `paths` exists and is non-empty
#   url_reachable       curl URL U returns 200
#   link_integrity      all href/src in F resolve (local exists, anchor valid,
#                       external optional via allow_external flag)
#
#   ---- DOM / selector ----
#   dom_required        CSS selector S in file F must match >=N nodes
#                       (supports must_include_data_* enum-coverage clauses)
#   dom_forbidden       CSS selector S in file F must match 0 nodes
#   attr_required       selector S in file F must carry attribute A
#   attr_enum           selector S attribute A ∈ allowed[] enum
#   attr_numeric_range  selector S attribute A is numeric in [min, max]
#                       (integer_only flag supported)
#
#   ---- HTML / accessibility ----
#   html5_valid             html5validator passes on file F
#   design_tokens_only      file F may not declare raw colors/fonts outside tokens.css
#   no_inline_style         file F contains 0 `style="..."` attributes
#   chart_contract          every .chart element in F carries legend+axis+source+tooltip+explain
#   methodology_footer      every page has footer with data-as-of + source attribution
#
#   ---- Playwright (runs against headless HTTP server) ----
#   playwright_screenshot            screenshot of URL U has delta <X% from baseline
#   playwright_a11y                  axe-core WCAG AA passes on URL U
#   playwright_no_horizontal_scroll  scrollWidth <= innerWidth + tolerance at viewport
#   playwright_tap_target            min tap-target dims at viewport (WCAG 2.5.5)
#
#   ---- Fixture / JSON ----
#   fixture_schema            fixture file F validates against JSON Schema S
#   fixture_parity            fixture F has a matching endpoint in spec §15
#   fixture_field_required    JSONPath path exists on every match (value_type, format, min_length supported)
#   fixture_numeric_range     JSONPath values are numeric in [min, max] (decimal_places_max supported)
#   fixture_array_length      JSONPath arrays have len >= min_length
#   fixture_enum              JSONPath values ∈ allowed[] enum
#   fixture_endpoint_reference  every endpoint in endpoints_must_appear[] is referenced by ≥1 fixture
#
#   ---- Rule engine meta ----
#   rule_coverage       every rule id in V1.1 rule-set has ≥1 hook slot in spec
#
# Each type is implemented as one function in scripts/check-frontend-criteria.py
# (S1-PRE-0). Adding a new type = ADR + function + entry in this list.
#
# severity: critical | high | medium | low
#   critical — blocks ship
#   high     — blocks ship unless exception approved
#   medium   — recorded in quality score, does not block
#   low      — informational
#
# All file paths are relative to /home/ubuntu/atlas/frontend/mockups/ unless
# noted.
# ============================================================================

settings:
  mockups_root: frontend/mockups
  fixtures_root: frontend/mockups/fixtures
  fixture_schemas_root: frontend/mockups/fixtures/schemas
  baseline_screenshots_root: frontend/mockups/.baselines
  spec_file: docs/design/frontend-v1-spec.md
  design_principles_file: docs/design/design-principles.md
  all_pages:
    - today.html
    - explore-global.html
    - explore-country.html
    - explore-sector.html
    - stock-detail.html
    - mf-detail.html
    - mf-rank.html
    - breadth.html
    - portfolios.html
    - lab.html
  existing_pages_pre_strip:
    - explore-global.html
    - explore-country.html
    - explore-sector.html
    - stock-detail.html
    - mf-detail.html
    - portfolios.html
  new_pages_stage1:
    - today.html
    - mf-rank.html
    - breadth.html
    - lab.html

# ============================================================================
# GROUP 1 — Global invariants (apply to every page)
# ============================================================================

criteria:

  # ---------- Reachability ----------
  - id: fe-g-01
    title: "Every V1 page is reachable at /mockups/{page}"
    description: "After deploy, every page in settings.all_pages returns HTTP 200."
    severity: critical
    source_spec_section: "§2"
    check:
      type: url_reachable
      url_template: "https://atlas.jslwealth.in/mockups/{page}"
      pages_from: settings.all_pages

  - id: fe-g-02
    title: "Spec viewer + spec markdown are reachable"
    description: "The locked spec renders at the atlas URL."
    severity: high
    source_spec_section: "§0"
    check:
      type: url_reachable
      urls:
        - "https://atlas.jslwealth.in/mockups/frontend-v1-spec.html"
        - "https://atlas.jslwealth.in/mockups/frontend-v1-spec.md"

  # ---------- HTML validity ----------
  - id: fe-g-03
    title: "All mockup pages are valid HTML5"
    description: "html5validator must report 0 errors across every page."
    severity: critical
    source_spec_section: "§0 (non-goal integrity)"
    check:
      type: html5_valid
      files: "frontend/mockups/*.html"

  # ---------- Design language purity ----------
  - id: fe-g-04
    title: "Pages use only tokens from tokens.css (no raw colors/fonts)"
    description: >
      Locked design language: no hex/rgb/hsl declarations outside tokens.css.
      Font-family declarations limited to the approved pair (Fraunces/Inter
      with JetBrains Mono for code). No inline styles except where explicitly
      whitelisted for per-instance geometry.
    severity: critical
    source_spec_section: "§1.5, design-principles §1, §2"
    check:
      type: design_tokens_only
      files: "frontend/mockups/*.html"
      allow_inline_style_properties: [width, height, transform, grid-column, grid-row]
      exceptions_files:
        - styleguide.html       # intentional: color swatch showcase
        - components.html       # intentional: component library demos
        - explorer.html         # intentional: reference explorer page
        - frontend-v1-spec.html # intentional: spec viewer markup
        - breadth-simulator-v8.html  # intentional: simulator reference
        - explore-global.html   # approved: nav-icon badge #fff on var(--accent-700)
        - explore-sector.html   # approved: nav-icon badge #fff on var(--accent-700)
        - stock-detail.html     # approved: chart series color + button text
        - mf-detail.html        # approved: fund category breakdown visualization
        - portfolios.html       # approved: nav-icon badge #fff on var(--accent-700)
        - portfolio-detail.html # approved: nav-icon badge #fff on var(--accent-700)
        - pulse-sectors.html    # approved: sector chart label color

  - id: fe-g-05
    title: "No dark-mode residue"
    description: "Dark-mode tokens, toggles, and `prefers-color-scheme: dark` media queries are forbidden."
    severity: critical
    source_spec_section: "§17 out-of-scope, user reset 2026-04-18"
    check:
      type: grep_forbid
      pattern: "prefers-color-scheme: dark|data-theme=\"dark\"|class=\"dark\"|--bg-dark|--dark-"
      files: "frontend/mockups/*.html frontend/mockups/*.css"

  # ---------- Commentary kill list ----------
  - id: fe-g-06
    title: "No LLM/verdict/recommendation prose (RECOMMEND tier gated to V1.1)"
    description: >
      V1 is data-representation only. Any BUY/HOLD/SELL/ADD ON DIPS/REDUCE
      verdict language or LLM-generated commentary must be absent. EXPLAIN
      and DESCRIBE tiers are allowed.
    severity: critical
    source_spec_section: "§1.1, §17"
    check:
      type: kill_list
      patterns:
        - "\\bBUY\\b"
        - "\\bHOLD\\b"
        - "\\bSELL\\b"
        - "ADD ON DIPS"
        - "REDUCE\\b"
        - "Atlas Verdict"
        - "Atlas Insight"
        - "AI verdict"
        - "AI commentary"
        - "GPT"
        - "LLM says"
        - "our recommendation"
      exceptions_files:
        - frontend-v1-spec.html
        - frontend-v1-spec.md
        - breadth-simulator-v8.html  # base file preserved for reference
      files: "frontend/mockups/*.html"

  # ---------- Indian i18n ----------
  - id: fe-g-07
    title: "All monetary display uses ₹ lakh/crore, never $ or million/billion"
    description: "CLAUDE.md hard stop: Indian formatting only."
    severity: critical
    source_spec_section: "§1.6"
    check:
      type: i18n_indian
      files: "frontend/mockups/*.html frontend/mockups/fixtures/*.json"
      forbidden_patterns:
        - "\\$[0-9]"               # dollar-prefix numbers
        - "\\bmillion\\b"
        - "\\bbillion\\b"
        - "\\btrillion\\b"
        - "[0-9]{4}-[0-9]{2}-[0-9]{2}T"  # ISO datetimes in visible DOM (IST display only)
      allowed_in_fixtures: true  # ISO dates OK inside fixture payloads

  # ---------- Commentary blocks (tiered) ----------
  - id: fe-g-08
    title: "Every page has an EXPLAIN block"
    description: "Static pedagogical block with formulas, at least one per page."
    severity: critical
    source_spec_section: "§1.1"
    check:
      type: dom_required
      selector: ".explain-block, [data-tier=explain]"
      min_count: 1
      files: "frontend/mockups/*.html"
      pages_from: settings.all_pages

  - id: fe-g-09
    title: "Every page has a methodology footer"
    description: "Footer with data-as-of, source attribution, last rebuild."
    severity: critical
    source_spec_section: "§1.1, §1.7"
    check:
      type: methodology_footer
      selector: "footer[data-role=methodology], .methodology-footer"
      must_contain:
        - "Source:"
        - "Data as of"
      pages_from: settings.all_pages

  # ---------- Info tooltips (ⓘ) ----------
  - id: fe-g-10
    title: "Every KPI tile carries a ⓘ info-tooltip"
    description: "§1.3 info-tooltip standard — mandatory on every metric."
    severity: high
    source_spec_section: "§1.3"
    check:
      type: dom_required
      parent_selector: ".kpi-tile, .metric-tile, [data-role=kpi]"
      child_selector: ".info-tooltip, [data-tooltip], .tooltip-icon"
      ratio: 1.0  # every parent must have at least one child
      pages_from: settings.all_pages

  - id: fe-g-11
    title: "Every info-tooltip carries a title attribute"
    description: "Tooltip content must be declarative (no hollow icons)."
    severity: high
    source_spec_section: "§1.3"
    check:
      type: attr_required
      selector: ".info-tooltip, .tooltip-icon"
      attribute: "title"
      min_length: 10

  # ---------- Chart contract (shared) ----------
  - id: fe-g-12
    title: "Every chart carries the 5-block contract"
    description: >
      Every .chart / .chart-with-events element must have: legend,
      axis-labels, source-attribution, hover-tooltip hook, EXPLAIN.
    severity: critical
    source_spec_section: "§1.5"
    check:
      type: chart_contract
      selector: ".chart-with-events, .chart"
      required_children:
        - ".chart__legend, [data-role=legend]"
        - ".chart__axis-x, [data-role=axis-x]"
        - ".chart__axis-y, [data-role=axis-y]"
        - ".chart__source, [data-role=source]"
        - ".chart__tooltip, [data-role=tooltip]"
        - ".chart__explain, [data-role=explain]"
      pages_from: settings.all_pages

  # ---------- Accessibility ----------
  - id: fe-g-13
    title: "Every page passes axe-core WCAG AA"
    description: "Baseline accessibility — headings hierarchy, contrast, alt text, aria labels."
    severity: high
    source_spec_section: "global, design-principles implied"
    check:
      type: playwright_a11y
      level: "wcag2aa"
      urls_from: settings.all_pages

  # ---------- Visual regression ----------
  - id: fe-g-14
    title: "Every page matches its visual baseline within 2% delta"
    description: "Playwright screenshot diff — prevents design drift chunk-over-chunk."
    severity: high
    source_spec_section: "§1.5, design-principles §1"
    check:
      type: playwright_screenshot
      max_delta_pct: 2.0
      viewport: { width: 1440, height: 900 }
      baselines_dir: settings.baseline_screenshots_root
      pages_from: settings.all_pages

  # ---------- Nav shell ----------
  - id: fe-g-15
    title: "Every page embeds the shared nav shell with all 10 entries"
    description: "Top nav shows all 10 Stage-1 pages + global search box."
    severity: critical
    source_spec_section: "§2, §13"
    check:
      type: dom_required
      selector: "nav.atlas-nav a, [data-role=nav] a"
      min_count: 10
      must_include_text:
        - "Today"
        - "Explore"
        - "Breadth"
        - "MF rank"
        - "Portfolios"
        - "Lab"
      pages_from: settings.all_pages

  - id: fe-g-16
    title: "Global search box present in top nav on every page"
    description: "§13 — the fuzzy search box is global, present everywhere."
    severity: critical
    source_spec_section: "§13"
    check:
      type: dom_required
      selector: "input.atlas-search, [data-role=global-search]"
      min_count: 1
      pages_from: settings.all_pages

  # ---------- Benchmark-mandatory rule ----------
  - id: fe-g-17
    title: "Every quantitative chart has a benchmark overlay or active-weight encoding"
    description: >
      design-principles §3: benchmark comparison is mandatory on every
      quantitative visual. Check: every chart carries either a benchmark
      line (Pattern A), zero-anchored bars (Pattern B), or a reference
      marker (Pattern C).
    severity: critical
    source_spec_section: "design-principles §3"
    check:
      type: dom_required
      parent_selector: ".chart-with-events, .chart[data-type=quantitative]"
      child_selector: "[data-role=benchmark], .chart__benchmark, [data-pattern=A], [data-pattern=B], [data-pattern=C]"
      ratio: 1.0

  # ---------- Deterministic rendering ----------
  - id: fe-g-18
    title: "No non-deterministic JS in mockups"
    description: "No Math.random() without seed, no unseeded new Date() visible in DOM."
    severity: high
    source_spec_section: "§0 (system guarantees)"
    check:
      type: grep_forbid
      pattern: "Math\\.random\\(\\)|new Date\\(\\)\\.(toString|toLocaleString|toISOString)"
      files: "frontend/mockups/*.html frontend/mockups/*.js"
      exceptions_files:
        - breadth-simulator-v8.html  # base file preserved

  # ---------- rec-slot placeholders ----------
  - id: fe-g-19
    title: "rec-slot placeholders present per §14 rule-hook slot index"
    description: "Every page listed in §14 has the declared rec-slot div, empty, with data-rule-scope + data-page."
    severity: critical
    source_spec_section: "§14"
    check:
      type: dom_required
      selector: "div.rec-slot[data-rule-scope][data-page]"
      min_count_per_page:
        today.html: 1
        explore-global.html: 1
        explore-country.html: 1
        explore-sector.html: 2
        stock-detail.html: 2
        mf-detail.html: 1
        mf-rank.html: 1
        breadth.html: 3
        portfolios.html: 4
        lab.html: 2

# ============================================================================
# GROUP 2 — Per-page specific criteria (§3..§12)
# ============================================================================

  # ---------- §3 Today / Pulse ----------
  - id: fe-p3-01
    title: "today.html: hero strip with 3 pulse tiles"
    severity: critical
    source_spec_section: "§3"
    check:
      type: dom_required
      file: today.html
      selectors:
        - { selector: ".pulse-hero", min: 1 }
        - { selector: ".pulse-tile", min: 3 }

  - id: fe-p3-02
    title: "today.html: regime band with days-in-regime"
    severity: critical
    source_spec_section: "§3"
    check:
      type: dom_required
      file: today.html
      selector: "[data-role=regime-band]"
      must_contain_text_any: ["Expansion", "Correction", "Distress"]

  - id: fe-p3-03
    title: "today.html: sector board (RRG) + movers strip + fund strip"
    severity: high
    source_spec_section: "§3"
    check:
      type: dom_required
      file: today.html
      selectors:
        - { selector: "[data-role=sector-board]", min: 1 }
        - { selector: "[data-role=movers]", min: 1 }
        - { selector: "[data-role=fund-strip]", min: 1 }

  # ---------- §4 Explore · Global ----------
  - id: fe-p4-01
    title: "explore-global.html: macros/rates/FX/commod/credit blocks all present"
    severity: critical
    source_spec_section: "§4"
    check:
      type: dom_required
      file: explore-global.html
      selectors:
        - { selector: "[data-block=macros]", min: 1 }
        - { selector: "[data-block=rates]", min: 1 }
        - { selector: "[data-block=fx]", min: 1 }
        - { selector: "[data-block=commodities]", min: 1 }
        - { selector: "[data-block=credit]", min: 1 }

  - id: fe-p4-02
    title: "explore-global.html: stripped of verdict language + commentary blocks"
    severity: critical
    source_spec_section: "§4 V1 additions, §17 out-of-scope"
    check:
      type: kill_list
      file: explore-global.html
      extra_patterns: ["Atlas Insight", "Atlas Verdict", "risk-on verdict", "risk-off verdict"]

  # ---------- §5 Explore · Country ----------
  - id: fe-p5-01
    title: "explore-country.html: embedded breadth panel per §5.1"
    severity: critical
    source_spec_section: "§5, §5.1"
    check:
      type: dom_required
      file: explore-country.html
      selector: "[data-block=breadth-compact]"
      min_count: 1

  - id: fe-p5-02
    title: "explore-country.html: compact signal-playback embed present"
    severity: high
    source_spec_section: "§10.5"
    check:
      type: dom_required
      file: explore-country.html
      selector: "[data-component=signal-playback][data-mode=compact]"
      min_count: 1

  - id: fe-p5-03
    title: "explore-country.html: sectors RRG + flows blocks present"
    severity: critical
    source_spec_section: "§5"
    check:
      type: dom_required
      file: explore-country.html
      selectors:
        - { selector: "[data-block=sectors-rrg]", min: 1 }
        - { selector: "[data-block=flows]", min: 1 }

  - id: fe-p5-04
    title: "explore-country.html: stripped of sect-comm, sect-alloc narrative"
    severity: critical
    source_spec_section: "§5 post-strip"
    check:
      type: dom_forbidden
      file: explore-country.html
      selectors:
        - "[data-block=sect-comm]"
        - "[data-block=sect-alloc]"
        - ".sect-narrative"

  # ---------- §6 Explore · Sector ----------
  - id: fe-p6-01
    title: "explore-sector.html: full breadth panel + full signal-playback present"
    severity: critical
    source_spec_section: "§6, §10.5"
    check:
      type: dom_required
      file: explore-sector.html
      selectors:
        - { selector: "[data-block=breadth-full]", min: 1 }
        - { selector: "[data-component=signal-playback][data-mode=full]", min: 1 }

  - id: fe-p6-02
    title: "explore-sector.html: members table + sector RS/Mom/Vol chips"
    severity: high
    source_spec_section: "§6"
    check:
      type: dom_required
      file: explore-sector.html
      selectors:
        - { selector: "[data-block=members]", min: 1 }
        - { selector: "[data-chip=rs]", min: 1 }
        - { selector: "[data-chip=momentum]", min: 1 }
        - { selector: "[data-chip=volume]", min: 1 }
        - { selector: "[data-chip=breadth]", min: 1 }

  # ---------- §7 Stock detail ----------
  - id: fe-p7-01
    title: "stock-detail.html: hero + chart + 4 RRG chips + peers + signal-playback compact"
    severity: critical
    source_spec_section: "§7, §10.5"
    check:
      type: dom_required
      file: stock-detail.html
      selectors:
        - { selector: "[data-block=hero]", min: 1 }
        - { selector: ".chart-with-events", min: 1 }
        - { selector: "[data-chip=rs]", min: 1 }
        - { selector: "[data-chip=momentum]", min: 1 }
        - { selector: "[data-chip=volume]", min: 1 }
        - { selector: "[data-chip=breadth]", min: 1 }
        - { selector: "[data-block=peers]", min: 1 }
        - { selector: "[data-component=signal-playback][data-mode=compact]", min: 1 }

  - id: fe-p7-02
    title: "stock-detail.html: Atlas Insight block removed"
    severity: critical
    source_spec_section: "§7 post-strip"
    check:
      type: dom_forbidden
      file: stock-detail.html
      selectors:
        - ".atlas-insight"
        - ".verdict-strip"
        - "[data-block=atlas-insight]"

  # ---------- §8 MF detail ----------
  - id: fe-p8-01
    title: "mf-detail.html: returns + alpha + holdings + weighted-technicals chips + signal-playback compact"
    severity: critical
    source_spec_section: "§8, §10.5"
    check:
      type: dom_required
      file: mf-detail.html
      selectors:
        - { selector: "[data-block=returns]", min: 1 }
        - { selector: "[data-block=alpha]", min: 1 }
        - { selector: "[data-block=holdings]", min: 1 }
        - { selector: "[data-block=weighted-technicals]", min: 1 }
        - { selector: "[data-component=signal-playback][data-mode=compact]", min: 1 }

  - id: fe-p8-02
    title: "mf-detail.html: Atlas Verdict HOLD/ADD ON DIPS removed"
    severity: critical
    source_spec_section: "§8 post-strip"
    check:
      type: kill_list
      file: mf-detail.html
      extra_patterns: ["Atlas Verdict", "HOLD / ADD ON DIPS", "ADD ON DIPS"]

  # ---------- §9 MF rank ----------
  - id: fe-p9-01
    title: "mf-rank.html: 4-factor scoring disclosed (Returns, Risk, Resilience, Consistency)"
    severity: critical
    source_spec_section: "§9"
    check:
      type: dom_required
      file: mf-rank.html
      selector: "[data-factor]"
      min_count: 4
      must_include_attr_values:
        data-factor: ["returns", "risk", "resilience", "consistency"]

  - id: fe-p9-02
    title: "mf-rank.html: tie-break indicator shown when composites tie"
    severity: high
    source_spec_section: "§9 tie-break order"
    check:
      type: dom_required
      file: mf-rank.html
      selector: "[data-role=tie-break]"
      min_count: 1

  - id: fe-p9-03
    title: "mf-rank.html: formula disclosure block present"
    severity: critical
    source_spec_section: "§9 EXPLAIN"
    check:
      type: dom_required
      file: mf-rank.html
      selector: ".explain-block[data-topic=mf-rank-formula]"
      must_contain_text_all:
        - "Returns"
        - "Risk"
        - "Resilience"
        - "Consistency"
        - "Composite"

  - id: fe-p9-04
    title: "mf-rank.html: filter rail + rank table present"
    severity: critical
    source_spec_section: "§9"
    check:
      type: dom_required
      file: mf-rank.html
      selectors:
        - { selector: "[data-block=filter-rail]", min: 1 }
        - { selector: "[data-block=rank-table]", min: 1 }
        - { selector: "[data-block=rank-table] thead th", min: 8 }

  # ---------- §10 Breadth Terminal ----------
  - id: fe-p10-01
    title: "breadth.html: hero with 3 headline counts (21-EMA, 50-DMA, 200-DMA)"
    severity: critical
    source_spec_section: "§10"
    check:
      type: dom_required
      file: breadth.html
      selector: "[data-headline=ema21], [data-headline=dma50], [data-headline=dma200]"
      min_count: 3

  - id: fe-p10-02
    title: "breadth.html: regime band + 3 KPI cards + oscillator chart + zone reference + DESCRIBE + signal history"
    severity: critical
    source_spec_section: "§10 blocks 2-7"
    check:
      type: dom_required
      file: breadth.html
      selectors:
        - { selector: "[data-role=regime-band]", min: 1 }
        - { selector: "[data-block=breadth-kpi]", min: 3 }
        - { selector: "[data-block=oscillator]", min: 1 }
        - { selector: "[data-block=zone-reference]", min: 1 }

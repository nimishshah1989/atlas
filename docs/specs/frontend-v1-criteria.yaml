# ============================================================================
# GROUP 9 — Design-principles enforcement (v1.1 DP cross-ref matrix §1.10)
# ============================================================================
#
# Spec §1.10 binds every page to a set of mandatory components from
# design-principles.md. GROUP 9 makes that mapping executable: each check
# asserts the required component exists in the DOM of every page listed in
# its `files` clause. Selectors match the semantic class names laid down in
# §1.5 + §1.10 (component library is authored in S1-PRE-1).
# ============================================================================

  # ---------- DP §12 Regime banner (mandatory on 8 pages) ----------
  - id: fe-dp-01
    title: "regime-banner present on all market-facing pages (DP §12)"
    description: >
      Every page that renders a regime-sensitive block (Today, Explore-*,
      Stock Detail, MF Detail, MF Rank, Breadth, Lab) must open with a
      regime-banner component. Lab may carry a dimmed variant when no
      simulation has been loaded — still required in the DOM.
    severity: critical
    source_spec_section: "DP §12; spec §1.10 row 1"
    check:
      type: dom_required
      files:
        - today.html
        - explore-global.html
        - explore-country.html
        - explore-sector.html
        - stock-detail.html
        - mf-detail.html
        - mf-rank.html
        - breadth.html
        - lab.html
      selector: ".regime-banner, [data-component='regime-banner']"
      min_count: 1
      must_carry_attrs:
        - "data-regime"        # one of: risk-on | risk-off | neutral
        - "data-as-of"         # ISO date

  - id: fe-dp-02
    title: "regime-banner: regime value drawn from a constrained enum"
    severity: high
    source_spec_section: "DP §12"
    check:
      type: attr_enum
      files:
        - today.html
        - explore-global.html
        - explore-country.html
        - explore-sector.html
        - stock-detail.html
        - mf-detail.html
        - mf-rank.html
        - breadth.html
        - lab.html
      selector: "[data-component='regime-banner']"
      attr: "data-regime"
      allowed: ["risk-on", "risk-off", "neutral", "mixed"]

  # ---------- DP §13 Signal strip (mandatory on instrument-row pages) ----------
  - id: fe-dp-03
    title: "signal-strip present on all instrument-row pages (DP §13)"
    description: >
      Every page that lists instruments (Explore-Country, Explore-Sector,
      MF Rank, Portfolios) or shows a single-instrument deep-dive
      (Stock Detail, MF Detail) must render a signal-strip carrying the
      7 canonical chips (RS, Momentum, Volume, Breadth, Gold-RS amp,
      Conviction + Divergences flag) per §1.2 + §1.2.1 + §1.2.2.
    severity: critical
    source_spec_section: "DP §13; spec §1.2, §1.10 row 2"
    check:
      type: dom_required
      files:
        - explore-country.html
        - explore-sector.html
        - stock-detail.html
        - mf-detail.html
        - mf-rank.html
        - portfolios.html
      selector: ".signal-strip, [data-component='signal-strip']"
      min_count: 1

  - id: fe-dp-04
    title: "signal-strip carries all 4 base RRG chips"
    severity: critical
    source_spec_section: "DP §13; spec §1.2"
    check:
      type: dom_required
      files:
        - stock-detail.html
        - mf-detail.html
      selector: "[data-component='signal-strip'] [data-chip]"
      min_count: 4
      must_include_data_chip:
        - rs
        - momentum
        - volume
        - breadth

  # ---------- DP §10 Gold RS amplifier + Conviction chip ----------
  - id: fe-dp-05
    title: "gold-rs-chip present on every instrument-row + deep-dive page"
    description: >
      §1.2.1 elevates Gold RS from a hidden composite to an explicit 5th
      chip rendered adjacent to the four RRG chips. Conviction (6th) and
      Divergences flag (7th) sit right of it.
    severity: critical
    source_spec_section: "DP §10; spec §1.2.1"
    check:
      type: dom_required
      files:
        - explore-country.html
        - explore-sector.html
        - stock-detail.html
        - mf-detail.html
        - mf-rank.html
        - portfolios.html
      selector: "[data-chip='gold-rs'], .gold-rs-chip"
      min_count: 1

  - id: fe-dp-06
    title: "conviction-chip present on every deep-dive page"
    severity: critical
    source_spec_section: "DP §10; spec §1.2"
    check:
      type: dom_required
      files:
        - stock-detail.html
        - mf-detail.html
      selector: "[data-chip='conviction'], .conviction-chip"
      min_count: 1
      must_carry_attrs:
        - "data-score"         # 0..100 integer
        - "data-band"          # low | medium | high

  - id: fe-dp-07
    title: "divergences-block present on deep-dive pages (DP §10 row 3)"
    description: >
      §1.2.2 surfaces price–breadth / price–volume divergences as an
      explicit block. Absence doesn't mean no data — the block must be
      present even if empty (with a zero-state label).
    severity: high
    source_spec_section: "DP §10; spec §1.2.2"
    check:

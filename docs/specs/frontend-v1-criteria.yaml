# ============================================================================
# GROUP 11 — Canonical states (§1.9, docs/design/frontend-v1-states.md)
# ============================================================================
#
# Every stale-capable block must carry a data-as-of attribute. Every
# empty/loading/error surface must be renderable without breaking layout.
# §1.9 defines the 4 canonical states: default, empty, loading, error.
# ============================================================================

  - id: fe-state-01
    title: "Every chart carries a data-as-of attribute"
    description: >
      Financial-domain guardrail (CLAUDE.md 'Always include data_as_of
      timestamp') — UI mirror. Every .chart element must declare when
      its underlying series was last refreshed.
    severity: critical
    source_spec_section: "§1.9; CLAUDE.md financial-domain"
    check:
      type: attr_required
      files_any: "frontend/mockups/*.html"
      selector: ".chart, [data-component*='chart']"
      attr: "data-as-of"

  - id: fe-state-02
    title: "Every regime-banner declares data-as-of"
    severity: critical
    source_spec_section: "§1.9"
    check:
      type: attr_required
      files_any: "frontend/mockups/*.html"
      selector: "[data-component='regime-banner']"
      attr: "data-as-of"

  - id: fe-state-03
    title: "Every signal-strip declares data-as-of"
    severity: high
    source_spec_section: "§1.9"
    check:
      type: attr_required
      files_any: "frontend/mockups/*.html"
      selector: "[data-component='signal-strip']"
      attr: "data-as-of"

  - id: fe-state-04
    title: "Empty-state pattern library present (DP-compliant)"
    description: >
      §1.9 requires a single reusable empty-state component with icon,
      title, body, and optional CTA. Mockup component library must
      contain at least one <template data-state='empty'>.
    severity: high
    source_spec_section: "§1.9 empty"
    check:
      type: dom_required
      files:
        - components.html
      selector: "[data-state='empty'], .empty-state"
      min_count: 1

  - id: fe-state-05
    title: "Loading skeleton pattern library present"
    severity: high
    source_spec_section: "§1.9 loading; rules/frontend-viz.md"
    check:
      type: dom_required
      files:
        - components.html
      selector: "[data-state='loading'], .skeleton"
      min_count: 1

  - id: fe-state-06
    title: "Error-state pattern library present"
    severity: high
    source_spec_section: "§1.9 error"
    check:
      type: dom_required
      files:
        - components.html
      selector: "[data-state='error'], .error-state"
      min_count: 1

  - id: fe-state-07
    title: "Staleness badge variants present (fresh / stale / very-stale)"
    description: >
      §1.9 staleness thresholds (JIP-calibrated): fresh ≤ 1 business day,
      stale 1–3 days, very-stale > 3 days. Component library must carry
      one visual variant per bucket.
    severity: high
    source_spec_section: "§1.9 staleness; project_jip_empty_tables.md"
    check:
      type: dom_required
      files:
        - components.html
      selector: "[data-staleness]"
      min_count: 3
      must_include_data_staleness:
        - fresh
        - stale
        - very-stale

  - id: fe-state-08
    title: "Methodology footer renders on every page"
    severity: critical
    source_spec_section: "§1.9; CLAUDE.md financial-domain; rules/frontend-viz.md"
    check:
      type: methodology_footer
      files_any: "frontend/mockups/*.html"
      must_contain:
        - "data as of"        # case-insensitive
        - "source"             # case-insensitive

  - id: fe-state-09
    title: "No naked '—' dashes without a staleness or empty label"
    description: >
      Kill-list addition: raw em-dash / en-dash / '-' as the only
      content of a cell usually means 'we couldn't fetch this' — which
      the user should see explicitly via an empty-state badge, not a
      silent dash.
    severity: medium
    source_spec_section: "§1.9 empty"
    check:
      type: dom_forbidden
      files_any: "frontend/mockups/*.html"
      selector: "td:only-child:empty, td[data-value='']:not([data-staleness]):not([data-state])"

  - id: fe-state-10
    title: "Every simulated/delayed block has an explicit delay label"
    description: >
      §1.9 — when a field depends on a feed with known lag (e.g., INDIAVIX
      4d lag per project_jip_empty_tables.md), the UI must surface the
      lag rather than hiding it.
    severity: high
    source_spec_section: "§1.9; project_jip_empty_tables.md"
    check:
      type: dom_required
      files:
        - stock-detail.html
        - breadth.html
      selector: "[data-lag], .lag-badge"
      min_count: 0   # informational pass-through; scored when applicable
      soft: true

# ============================================================================
# GROUP 12 — v1.1 fixture additions (mf_rank_universe, sector_rrg)
# ============================================================================
#
# GROUP 4 fe-f-03 already asserts file existence. GROUP 12 adds content-
# shape checks for the two newly-introduced schemas to guarantee they
# carry the fields the §6 + §9 pages bind to.
# ============================================================================

  - id: fe-f-04
    title: "mf_rank_universe fixture carries all 4 composite factors per row"
    description: >
      §9 MF-rank 4-factor composite: Returns, Risk, Resilience, Consistency.
      Each row in the fixture must expose all four as separate numeric fields
      plus the composite — so the §9 mockup can render the breakdown without
      any math in the template.
    severity: critical
    source_spec_section: "§9; frontend-v1-spec.md v1.1 MF-rank formula block"
    check:
      type: fixture_field_required
      fixture: frontend/mockups/fixtures/mf_rank_universe.json
      path: "$.funds[*]"
      required_fields:
        - scheme_code
        - scheme_name
        - category
        - returns_score
        - risk_score
        - resilience_score
        - consistency_score
        - composite_score
        - tie_break_rank

  - id: fe-f-05
    title: "mf_rank_universe: composite_score is 0..100 with 1dp precision"
    severity: high
    source_spec_section: "§9 MF-rank"
    check:
      type: fixture_numeric_range
      fixture: frontend/mockups/fixtures/mf_rank_universe.json
      path: "$.funds[*].composite_score"
      min: 0
      max: 100
      decimal_places_max: 1

  - id: fe-f-06
    title: "sector_rrg fixture carries RS-ratio + RS-momentum per sector"
    description: >
      §6 Sector RRG chart expects one point per sector with both axes
      plus a sector_name + tail (historical 8-week trajectory) for the
      canonical RRG rendering.
    severity: critical
    source_spec_section: "§6 Sector RRG"
    check:
      type: fixture_field_required
      fixture: frontend/mockups/fixtures/sector_rrg.json
      path: "$.sectors[*]"
      required_fields:
        - sector_code
        - sector_name
        - rs_ratio
        - rs_momentum
        - quadrant        # leading | weakening | lagging | improving
        - tail

  - id: fe-f-07
    title: "sector_rrg: every sector carries a tail of length >= 8"
    description: >
      §6 renders an 8-week trajectory tail into each RRG quadrant.
      Shorter tail = broken chart.
    severity: high
    source_spec_section: "§6 Sector RRG"
    check:
      type: fixture_array_length
      fixture: frontend/mockups/fixtures/sector_rrg.json
      path: "$.sectors[*].tail"
      min_length: 8

  - id: fe-f-08
    title: "sector_rrg: quadrant value drawn from a fixed enum"
    severity: critical
    source_spec_section: "§6 Sector RRG"
    check:
      type: fixture_enum
      fixture: frontend/mockups/fixtures/sector_rrg.json
      path: "$.sectors[*].quadrant"
      allowed: ["leading", "weakening", "lagging", "improving"]

  - id: fe-f-09
    title: "All fixtures carry a top-level data_as_of ISO date"
    description: >
      Mirrors fe-state-01/02/03 from the UI side — fixture files must
      declare their own data_as_of so the mockup page can hydrate the
      staleness badges without hard-coding a date in HTML.
    severity: critical
    source_spec_section: "§1.9; CLAUDE.md financial-domain"
    check:
      type: fixture_field_required
      fixture_glob: "frontend/mockups/fixtures/*.json"
      path: "$.data_as_of"
      format: "date"         # YYYY-MM-DD

  - id: fe-f-10
    title: "All fixtures carry a source attribution string"
    severity: high
    source_spec_section: "§1.9; rules/frontend-viz.md 'data source attribution always'"
    check:
      type: fixture_field_required
      fixture_glob: "frontend/mockups/fixtures/*.json"
      path: "$.source"
      value_type: "string"
      min_length: 3


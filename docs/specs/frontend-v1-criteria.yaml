  # ---------- DP §15 Interpretation sidecar ----------
  - id: fe-dp-09
    title: "interpretation-sidecar present on all deep-dive pages"
    description: >
      DP §15 demands an interpretation sidecar adjacent to every headline
      chart — the three-tier EXPLAIN / DESCRIBE / RECOMMEND ladder
      per §1.1 commentary tiers. RECOMMEND tier must be absent from V1
      (v1.1 gated) — check only the tier tabs.
    severity: critical
    source_spec_section: "DP §15; spec §1.1, §1.10 row 4"
    check:
      type: dom_required
      files:
        - stock-detail.html
        - mf-detail.html
        - explore-country.html
        - explore-sector.html
        - breadth.html
      selector: "[data-component='interpretation-sidecar'], .interpretation-sidecar"
      min_count: 1
      must_carry_attrs:
        - "data-tier"          # explain | describe  (recommend: V1.1 gated)

  - id: fe-dp-10
    title: "interpretation-sidecar: RECOMMEND tier is gated OFF in V1"
    description: >
      V1.1 rule-engine wiring carries RECOMMEND tier. V1 must render only

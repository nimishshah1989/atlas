    description: >
      DP §14 mandates that any performance chart comparing instrument vs
      benchmark renders with dual axes and a differentiated right-axis.
      Stock Detail, MF Detail, Explore-Country, Explore-Sector all qualify.
    severity: critical
    source_spec_section: "DP §14; spec §1.10 row 3"
    check:
      type: dom_required
      files:
        - stock-detail.html
        - mf-detail.html
        - explore-country.html
        - explore-sector.html
      selector: ".chart[data-dual-axis='true'], [data-component='dual-axis-overlay']"

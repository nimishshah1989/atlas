version: "1.5"
name: "ATLAS V1.5 — Quality Retrofit"
description: >
  Retrofit V1 to meet the seven-dimension quality standard, then establish the
  autonomous orchestrator as the mechanism for every subsequent chunk. C1-C4
  are bootstrapped outside the orchestrator; C5 onward run through it.

# Global settings the runner consults for every chunk.
settings:
  repo_root: /home/ubuntu/atlas
  quality:
    script: .quality/checks.py
    report: .quality/report.json
    # Legacy composite — retained for C1–FD4 chunks that pre-date S1.
    # Post-S1, the gate no longer reads min_overall; it reads
    # min_per_gating_dim and iterates .quality/report.json's `dims` map.
    min_overall: 80
    min_per_gating_dim: 80
    # Legacy per-dimension floors (pre-S1). Kept so mid-flight chunks
    # don't break if they roll back onto this plan. S1 drops devops+docs
    # and adds backend+product (backend+product start non-gating).
    min_dimensions:
      security: 80
      code: 70
      architecture: 80
      frontend: 70
      devops: 70
      docs: 75
    # Post-S1 gating flags. S1 ships backend+product as non-gating;
    # V1.6 R1 is the chunk that flips them to gating: true.
    gating:
      security: true
      code: true
      architecture: true
      api: true
      frontend: true
      backend: false
      product: false
  retry:
    max_attempts: 3
    backoff_seconds: 30
  claude:
    binary: claude
    model: claude-opus-4-6
    # Chunk sessions are stateless — each spawn is a fresh context.
    extra_args: ["--dangerously-skip-permissions"]
  # Post-chunk sync hook — runs after a chunk transitions to DONE. Keeps
  # git (origin), EC2 filesystem, and the knowledge wiki in lockstep so
  # the next chunk always starts from a clean, deployed, compiled base.
  # Responsibilities: residual commit, push to origin, restart services,
  # spawn /forge-compile headless. See scripts/post-chunk.sh.
  post_chunk:
    enabled: true
    script: scripts/post-chunk.sh

# State machine: PENDING → PLANNING → IMPLEMENTING → TESTING → QUALITY_GATE → DONE
# On failure at any stage: → FAILED → (retry up to max_attempts) → BLOCKED
chunks:
  - id: C1
    title: "Quality engine + frozen standards"
    status: DONE
    bootstrap: true
    artifacts:
      - .quality/standards.md
      - .quality/SOURCE.md
      - .quality/checks.py

  - id: C2
    title: "Orchestrator skeleton — plan, state DB, state machine"
    status: DONE
    bootstrap: true
    depends_on: [C1]
    artifacts:
      - orchestrator/plan.yaml
      - orchestrator/schema.sql
      - orchestrator/state.py
      - orchestrator/plan_loader.py
      - orchestrator/state_machine.py

  - id: C3
    title: "Chunk runner — spawn Claude, run gate, transition state"
    status: DONE
    bootstrap: true
    depends_on: [C2]
    artifacts:
      - orchestrator/runner.py
      - orchestrator/prompts.py

  - id: C4
    title: "CLI + systemd + logging"
    status: DONE
    bootstrap: true
    depends_on: [C3]
    artifacts:
      - orchestrator/cli.py
      - orchestrator/logging_config.py
      - orchestrator/systemd/atlas-forge.service
      - orchestrator/README.md

  # Below here: everything runs THROUGH the orchestrator, one chunk per session.

  - id: C5
    title: "Security hardening — .env.example, CORS allowlist, rate limiting, pip-audit"
    status: PENDING
    depends_on: [C4]
    quality_targets:
      security: 95
    punch_list:
      - Create backend/.env.example with every var the app reads
      - Replace CORS "*" with explicit allowlist from settings
      - Add slowapi rate limiting on all /api/v1/* routes
      - Run pip-audit and resolve or document every advisory
      - Document secret rotation in SECURITY.md

  - id: C6
    title: "Code quality — split god module, shrink long funcs, fix broad excepts"
    status: PENDING
    depends_on: [C4]
    quality_targets:
      code: 85
    punch_list:
      - Split backend/services/jip_data_service.py (505L) by concern
      - Refactor the two >80-line functions flagged by checks.py
      - Replace 5 broad except clauses with specific exception types
      - Rename 36 generic variable names flagged by the scorer
      - Wire ruff + mypy + pytest-cov into pre-commit

  - id: C7
    title: "DevOps — Dockerfile, GitHub Actions, Alembic"
    status: PENDING
    depends_on: [C4]
    quality_targets:
      devops: 90
      architecture: 90
    punch_list:
      - Multi-stage Dockerfile for backend (python:3.12-slim base)
      - docker-compose.yml for local dev (backend + frontend)
      - .github/workflows/ci.yml — ruff, mypy, pytest, quality gate
      - Initialize Alembic, generate baseline migration from current models
      - Document deploy runbook in DEPLOY.md

  - id: C8
    title: "Build dashboard — Next.js UI + nginx + Let's Encrypt"
    status: PENDING
    depends_on: [C4]
    quality_targets:
      frontend: 85
    punch_list:
      - Replace build-dashboard/app.py with Next.js page under frontend/
      - Live chunk status + quality scores + logs tail
      - nginx reverse proxy config
      - certbot / Let's Encrypt for forge.atlas.jsl.internal

  - id: C9
    title: "Frontend hardening — split large components, headless browser checks"
    status: PENDING
    depends_on: [C8]
    quality_targets:
      frontend: 90
    punch_list:
      - Split the 2 components >200 lines flagged by checks.py
      - Add Playwright smoke tests for Market → Sector → Stock flow
      - Lighthouse budget in CI

  - id: C10
    title: "Docs — README, architecture diagram, contributor guide"
    status: PENDING
    depends_on: [C4]
    quality_targets:
      docs: 95
    punch_list:
      - Top-level README.md with quickstart
      - docs/architecture.md with Mermaid diagrams
      - CONTRIBUTING.md covering orchestrator workflow

  - id: C11
    title: "API live checks — deploy + run API dimension of quality gate"
    status: PENDING
    depends_on: [C5, C6, C7]
    quality_targets:
      api: 85
    punch_list:
      - Deploy backend to EC2 via C7 pipeline
      - Run .quality/checks.py --dimension api against live service
      - Confirm overall score ≥ 90 across all seven dimensions

  # =====================================================================
  # S1–S4: Scoring engine rewrite block (pre-V1.6).
  # Fixes the composite/drift problem that let V1 ship without agents.
  # Introduces: 7 dims (adds backend + product, folds/drops devops+docs),
  # passed/eligible formula, no composite, per-dim 80% floor.
  # backend + product dims start non-gating and flip to gating in V1.6 R1.
  # Full specs: docs/specs/chunks/s{1,2,3,4}.md
  # =====================================================================

  - id: S1
    title: "Scoring engine rewrite — 7 dims, no composite, per-dim 80% floor"
    status: PENDING
    depends_on: []
    spec: docs/specs/chunks/s1.md
    quality_targets:
      code: 85
      architecture: 85
    punch_list:
      - Inventory current 53 checks; apply fold/keep/drop table from s1.md
      - Add .quality/dimensions/ package with backend.py and product.py (stub)
      - Gut composite from .quality/checks.py; emit per-dim DimensionResult
      - Fold devops checks (docker_build, alembic_apply, pip_audit) into backend
      - Fold docs checks (readme, claude_md_live, adr_count) into architecture
      - Drop ceremony checks (ssl_expiry, bundle_size, wiki_freshness, etc.)
      - Rewire orchestrator/runner.py _run_quality_gate to iterate gating dims
      - Update plan.yaml settings.quality (already done in this diff)
      - Update forge dashboard UI to render 7 bars, no composite
      - Unit tests for dimension registry + runner gate logic
      - Confirm 5 gating dims all ≥ 80 on current repo before DONE

  - id: S2
    title: "standards.md rewrite — audit 53, add backend+product rubrics"
    status: PENDING
    depends_on: [S1]
    spec: docs/specs/chunks/s2.md
    quality_targets:
      architecture: 90
    punch_list:
      - Audit all 53 existing checks for KEEP/FOLD/DROP (match S1 code)
      - Add missing checks surfaced by Forge Four Laws + project conventions
      - Write full rubric for backend dim (10 checks, plain English + fix + severity)
      - Write product dim framing + worked example (V1 criterion 7)
      - Strip obsolete content (four platforms, composite formula, fix prompts)
      - Add .quality/verify_doc_matches_code.py as new architecture check
      - Every check in checks.py ↔ entry in standards.md (bidirectional)
      - .quality/CHANGES.md with fold/drop/add log

  - id: S3
    title: "v1-criteria.yaml — wire §24.3 into product dim"
    status: PENDING
    depends_on: [S2]
    spec: docs/specs/chunks/s3.md
    quality_targets:
      architecture: 85
    punch_list:
      - Write docs/specs/v1-criteria.schema.json
      - Transcribe all 15 §24.3 criteria to docs/specs/v1-criteria.yaml
      - Implement 5 check types (http_contract, sql_count, sql_invariant, python_callable, file_exists)
      - Flesh out .quality/dimensions/product.py (S1 left it stubbed)
      - Run product dim; confirm ~86% (13/15) with criteria 7+12 failing
      - Add V1 completion progress bar to forge dashboard
      - Product dim stays gating:false (V1.6 R1 flips it)

  - id: S4
    title: "CLAUDE.md surgery — strip to 80 lines, operational rules only"
    status: PENDING
    depends_on: [S3]
    spec: docs/specs/chunks/s4.md
    quality_targets:
      architecture: 90
    punch_list:
      - Move Critical Schema Facts → docs/architecture/critical-schema-facts.md
      - Move Data Flow → docs/architecture/data-flow.md
      - Move Technology Stack → docs/architecture/tech-stack.md
      - Delete V1 criteria list (now in v1-criteria.yaml)
      - Delete Build Order V1→V10 (now in spec)
      - Delete Hard Stop Conditions (now in standards.md)
      - Rewrite remaining CLAUDE.md to 80–120 lines, operational only
      - Preserve Four Laws, System Guarantees, post-chunk invariant, Step 0 protocol verbatim
      - Verify all pointers resolve; grep-verify no scope strings remain
      - All 5 gating dims still ≥ 80 post-rewrite


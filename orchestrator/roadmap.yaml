# Canonical V0–V10 roadmap. Edit this file to add chunks; the dashboard
# picks them up automatically. Lint enforces consistency with plan.yaml.
#
# Rules:
#   - version ids: V0 (infra) and V1–V10 (product slices)
#   - chunk ids:   must also exist in orchestrator/state.db
#   - chunks declared without a `title:` inherit it from plan.yaml when
#     listed there (plan_ref convention). Otherwise an inline `title:` is
#     required.
#   - check types: file_exists | command | http_ok | db_query | smoke_list

versions:
